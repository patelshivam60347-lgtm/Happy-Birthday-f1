<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* TEXT */
.text{
    font-size:26px;
    color:#fff;
    text-align:center;
    text-shadow:0 0 10px rgba(255,255,255,0.8);
    margin-bottom:20px;
}

/* BUTTON */
button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* HEARTS */
.heart{
    position:absolute;
    color:rgba(255,0,100,0.6);
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* CAKE */
.cake{
    font-size:80px;
    display:none;
    animation:pop 1s ease forwards;
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

/* SLIDESHOW */
.slideshow{
    width:250px;
    height:250px;
    margin-top:20px;
    border-radius:20px;
    overflow:hidden;
    display:none;
}

.slideshow img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div class="text" id="typing"></div>

<button onclick="surprise()">🎁 Click for Surprise</button>

<div class="cake" id="cake">🎂</div>

<div class="slideshow" id="slideshow">
    <img id="slide" src="">
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3">
</audio>

<script>
// Typing Effect
const msg = "Happy Birthday jayu 🎉 You are special ❤️";
let i = 0;

function typeEffect(){
    if(i < msg.length){
        document.getElementById("typing").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

// Floating Hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random()*100+"vw";
    heart.style.fontSize = (10+Math.random()*20)+"px";
    heart.style.animationDuration = (3+Math.random()*3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);

// Slideshow Images (CHANGE THESE)
const images = [
    "https://picsum.photos/300?1",
    "https://picsum.photos/300?2",
    "https://picsum.photos/300?3"
];

let index = 0;

function startSlideshow(){
    const slide = document.getElementById("slide");
    slide.src = images[index];

    setInterval(()=>{
        index = (index+1)%images.length;
        slide.src = images[index];
    },2000);
}

// Surprise Button
function surprise(){
    document.getElementById("cake").style.display = "block";
    document.getElementById("slideshow").style.display = "block";
    
    startSlideshow();

    document.getElementById("music").play();
}
</script>

</body>
</html>
